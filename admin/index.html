<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Panel — Agustín Segura Prado</title>
  <link rel="icon" type="image/png" href="/assets/favicon-32.png" />
  <link rel="stylesheet" href="/fonts.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>

  <!-- ====== LOGIN ====== -->
  <div class="login" id="login">
    <form class="login__card" id="loginForm">
      <div class="eye">Panel privado</div>
      <div class="login__name disp">Agustín <i>Segura</i> Prado</div>
      <p class="muted" style="font-size:.82rem">Introduce tu contraseña para editar la web</p>
      <div class="field">
        <label for="pass">Contraseña</label>
        <i class="ti ti-key ic" aria-hidden="true"></i>
        <input type="password" id="pass" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="loginBtn">Entrar</button>
      <p class="login__err" id="loginErr" role="alert"></p>
      <p class="login__hint">Sin GitHub, sin instalar nada. Solo tu contraseña.</p>
    </form>
  </div>

  <!-- ====== APP ====== -->
  <div class="app hidden" id="app">
    <header class="topbar">
      <div class="brand">ASP<b>·</b>Panel</div>
      <div class="topbar__actions">
        <span class="savebadge" id="saveBadge"><i class="ti ti-circle-check"></i> Guardado</span>
        <a class="btn ghost sm" href="/" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> Ver web</a>
        <button class="btn sm" id="saveBtn"><i class="ti ti-device-floppy"></i> Guardar cambios</button>
        <button class="iconbtn" id="logoutBtn" title="Cerrar sesión" aria-label="Cerrar sesión"><i class="ti ti-logout"></i></button>
      </div>
    </header>

    <div class="shell">
      <nav class="side" id="side">
        <div class="eye">Contenido</div>
        <button class="navit on" data-screen="hero"><i class="ti ti-photo"></i><span>Portada</span></button>
        <button class="navit" data-screen="sections"><i class="ti ti-layout-grid"></i><span>Secciones</span></button>
        <button class="navit" data-screen="about"><i class="ti ti-user"></i><span>Sobre mí</span></button>
        <button class="navit" data-screen="contact"><i class="ti ti-mail"></i><span>Contacto</span></button>
        <div class="eye">Ajustes</div>
        <button class="navit" data-screen="site"><i class="ti ti-at"></i><span>Redes y datos</span></button>
        <button class="navit" data-screen="ui"><i class="ti ti-language"></i><span>Textos web</span></button>
        <div class="side__sep"></div>
      </nav>

      <main class="main" id="screen"></main>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="busy hidden" id="busy"><div class="busy__box"><span class="spin"></span> <span id="busyMsg">Subiendo…</span></div></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
