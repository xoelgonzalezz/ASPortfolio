# Panel de administración (Sveltia CMS — compatible con Decap)
# Edita CONTENT.JSON y sube las imágenes; al guardar se publica solo (commit -> Vercel).
backend:
  name: github
  repo: xoelgonzalezz/ASPortfolio
  branch: main
  base_url: https://agustinseguraprado.vercel.app   # donde viven /api/auth y /api/callback (cámbialo al dominio propio cuando el DNS esté OK)
  auth_endpoint: api/auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: es
site_url: https://agustinseguraprado.com

collections:
  - name: contenido
    label: "Contenido"
    description: "Edita los textos (ES/GL/EN), las secciones, las fotos y los vídeos."
    files:
      - name: portfolio
        label: "Portfolio (todo el contenido)"
        file: "content.json"
        format: json
        fields:
          - label: "Datos de contacto"
            name: site
            widget: object
            collapsed: true
            fields:
              - { label: "Nombre", name: name, widget: string }
              - { label: "Email", name: email, widget: string }
              - { label: "Instagram (URL)", name: instagram, widget: string }
              - { label: "Instagram (@)", name: instagramHandle, widget: string }
              - { label: "LinkedIn (URL)", name: linkedin, widget: string }
              - { label: "LinkedIn (texto)", name: linkedinLabel, widget: string }

          - label: "Portada (Hero)"
            name: hero
            widget: object
            fields:
              - { label: "Imagen principal", name: image, widget: image }
              - label: "Antetítulo"
                name: eyebrow
                widget: object
                fields: &tres_idiomas
                  - { label: "Español", name: es, widget: string }
                  - { label: "Galego", name: gl, widget: string }
                  - { label: "English", name: en, widget: string }
              - label: "Texto de introducción"
                name: lede
                widget: object
                fields: &tres_idiomas_largo
                  - { label: "Español", name: es, widget: text }
                  - { label: "Galego", name: gl, widget: text }
                  - { label: "English", name: en, widget: text }
              - { label: "Pie de foto", name: caption, widget: object, fields: *tres_idiomas }

          - label: "Secciones"
            name: sections
            label_singular: "Sección"
            widget: list
            types:
              - label: "Sección de FOTOS"
                name: gallery
                summary: "{{fields.nav.es}}"
                fields:
                  - { label: "ID (sin espacios, p.ej. retrato)", name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'solo minúsculas, números y guiones'] }
                  - { label: "Nombre en el menú", name: nav, widget: object, fields: *tres_idiomas }
                  - { label: "Título", name: title, widget: object, fields: *tres_idiomas, hint: "Puedes poner una parte en cursiva con <i>texto</i>" }
                  - { label: "Descripción", name: desc, widget: object, fields: *tres_idiomas_largo }
                  - { label: "Fotos", name: photos, widget: list, field: { label: "Foto", name: foto, widget: image }, hint: "Arrastra para reordenar. Sube fotos en alta calidad." }
                  - label: "Vídeos (opcional, se muestran encima de las fotos)"
                    name: videos
                    widget: list
                    required: false
                    fields:
                      - { label: "ID de YouTube", name: yt, widget: string, hint: "El código tras v= en la URL de YouTube" }
                      - { label: "Título", name: title, widget: string, required: false }
              - label: "Sección AUDIOVISUAL (vídeos)"
                name: video
                summary: "{{fields.nav.es}}"
                fields:
                  - { label: "ID", name: id, widget: string, pattern: ['^[a-z0-9-]+$', 'solo minúsculas, números y guiones'] }
                  - { label: "Nombre en el menú", name: nav, widget: object, fields: *tres_idiomas }
                  - { label: "Título", name: title, widget: object, fields: *tres_idiomas }
                  - { label: "Descripción", name: desc, widget: object, fields: *tres_idiomas_largo }
                  - label: "Grupos de vídeos"
                    name: groups
                    widget: list
                    fields:
                      - { label: "Título del grupo", name: title, widget: object, fields: *tres_idiomas }
                      - { label: "Subtítulo / créditos", name: meta, widget: object, required: false, fields: *tres_idiomas }
                      - { label: "¿Vídeo grande (horizontal)?", name: feature, widget: boolean, default: false, required: false }
                      - label: "Vídeos"
                        name: videos
                        widget: list
                        fields:
                          - { label: "ID de YouTube", name: yt, widget: string }
                          - { label: "Título", name: title, widget: string, required: false }

          - label: "Sobre mí"
            name: about
            widget: object
            fields:
              - { label: "Foto", name: image, widget: image }
              - { label: "Título", name: title, widget: object, fields: *tres_idiomas }
              - { label: "Párrafo 1", name: p1, widget: object, fields: *tres_idiomas_largo }
              - { label: "Párrafo 2", name: p2, widget: object, fields: *tres_idiomas_largo }
              - label: "Etiquetas (servicios)"
                name: chips
                widget: object
                fields:
                  - { label: "Español", name: es, widget: list, field: { label: Etiqueta, name: t, widget: string } }
                  - { label: "Galego", name: gl, widget: list, field: { label: Etiqueta, name: t, widget: string } }
                  - { label: "English", name: en, widget: list, field: { label: Tag, name: t, widget: string } }

          - label: "Contacto"
            name: contact
            widget: object
            fields:
              - { label: "Título", name: title, widget: object, fields: *tres_idiomas }

          - label: "Textos de interfaz (botones, pie)"
            name: ui
            widget: object
            collapsed: true
            fields:
              - label: "Español"
                name: es
                widget: object
                fields: &ui_fields
                  - { label: "Saltar al contenido", name: skip, widget: string }
                  - { label: "Sobre mí (menú)", name: sobremi, widget: string }
                  - { label: "Contacto (menú)", name: contacto, widget: string }
                  - { label: "Botón 1 (hero)", name: hero_cta1, widget: string }
                  - { label: "Botón 2 (hero)", name: hero_cta2, widget: string }
                  - { label: "Pie: descripción", name: footer_tag, widget: string }
                  - { label: "Pie: arriba", name: footer_top, widget: string }
                  - { label: "Pie: derechos", name: footer_rights, widget: string }
                  - { label: "Aviso legal", name: legal1, widget: string }
                  - { label: "Privacidad", name: legal2, widget: string }
                  - { label: "Vídeo: respaldo", name: video_fallback, widget: string }
                  - { label: "Vídeo: aviso cookies", name: video_notice, widget: string }
              - { label: "Galego", name: gl, widget: object, fields: *ui_fields }
              - { label: "English", name: en, widget: object, fields: *ui_fields }
